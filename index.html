            --text-muted: #5c7e97;

            --detail-title: #176b48;
            --meta-color: #5c7e97;
            --border-light: #e6edf4;
            --contact-bg: #eef2f9;
            --contact-border: #cfe0ec;
            --back-btn-bg: #2c7a5c;

            --text-secondary: #cbd5e6;
            --text-muted: #94a3b8;

            --badge-bg: #2d3a4e;
            --badge-color: #7dd3a0;
            --detail-title: #6ee7b7;
            --meta-color: #94a3b8;
            --border-light: #334155;
            --contact-bg: #2d3a4e;
            --contact-border: #475569;
            --back-btn-bg: #2d6a4f;

            to { opacity: 1; transform: translateY(0); }

            border: 1px solid var(--card-border);
            transition: transform 0.12s cubic-bezier(0.2, 0.9, 0.4, 1.1), box-shadow 0.2s ease;
            cursor: pointer;

        .contact-link {

        return Math.round(value).toLocaleString();

            const annualFormatted = formatNumber(lvl.annual);

                        <span class="level-name">${levelDisplay}</span>

        { id: "salary-levels", title: "📊 Level Salary Schedule", desc: "Full level commission table · Levels 1-9" },
        { id: "topup-steps", title: "🔁 Top‑Up Steps", desc: "Contact manager → transfer → confirm → credit" },
        { id: "withdrawal-rules", title: "🏦 Withdrawal Rules", desc: "Mon–Fri only, arrive 1–4 days" },
        { id: "why-topup", title: "❓ Why Top Up?", desc: "Deposit is working capital, fully refundable" },
        { id: "order-process", title: "⏳ Order Process", desc: "Auto countdown, commission auto‑credit" },
        { id: "extra-earnings", title: "💡 Extra Earnings", desc: "Invitation bonuses, rebates, salary" },
        { id: "what-is-pg", title: "🌐 What Is PG?", desc: "USA registered, 7+ years" },
        { id: "why-pg-safe", title: "🔒 Why Is PG Safe?", desc: "Legal, stable, fund security" },
        { id: "contact-manager", title: "📞 Contact Manager", desc: "Telegram/Signal, 10am–10pm" }
    ];

    // DOM elements
    const homeContainer = document.getElementById('homeContainer');
    const detailContainer = document.getElementById('detailContainer');
    const cardsArea = document.getElementById('cardsArea');
    const detailContentDiv = document.getElementById('detailContent');
    const backBtn = document.getElementById('backHomeBtn');
    const themeToggle = document.getElementById('themeToggleBtn');
    const backToHomeFloat = document.getElementById('backToHomeFloatBtn');
    const backToTopBtn = document.getElementById('backToTopBtn');
    let currentDetailId = null;
    let savedHomeScroll = 0;

    // Theme management
    function setTheme(theme) {
        if (theme === 'dark') {
            document.documentElement.classList.add('dark-theme');
            localStorage.setItem('pg-theme', 'dark');
            if (themeToggle) themeToggle.innerHTML = '☀️ <span>Light</span>';
        } else {
            document.documentElement.classList.remove('dark-theme');
            localStorage.setItem('pg-theme', 'light');
            if (themeToggle) themeToggle.innerHTML = '🌙 <span>Dark</span>';
        }
    }
    function toggleTheme() { setTheme(document.documentElement.classList.contains('dark-theme') ? 'light' : 'dark'); }
    function initTheme() {
        const saved = localStorage.getItem('pg-theme');
        if (saved === 'dark') setTheme('dark');
        else if (saved === 'light') setTheme('light');
        else setTheme(window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    }

    // Update floating buttons visibility
    function updateFloatingButtonsVisibility() {
        const isDetailVisible = !detailContainer.classList.contains('hidden');
        const scrollY = window.scrollY;
        // Return home button: always visible on detail page
        if (backToHomeFloat) {
            backToHomeFloat.classList.toggle('show', isDetailVisible);
        }
        // Back to top: visible when scroll > 300px (both home and detail)
        if (backToTopBtn) {
            backToTopBtn.classList.toggle('show', scrollY > 300);
        }
    }

    // Go to home view (preserve history state)
    function goToHome() {
        if (currentDetailId === null) return;
        currentDetailId = null;
        detailContainer.classList.add('hidden');
        homeContainer.classList.remove('hidden');
        document.title = "PG Earn – Daily Commission | Level Salary Schedule";
        // Push home state so that back button returns to home (instead of leaving the app)
        history.pushState({ view: 'home' }, '', window.location.pathname);
        window.scrollTo({ top: savedHomeScroll, behavior: 'instant' });
        updateFloatingButtonsVisibility();
    }

    function renderDetailById(id) {
        const article = ARTICLES[id];
        if (!article) return false;
        const fullHtml = `
            <div class="detail-title">${article.title}</div>
            <div class="detail-meta">📌 ${article.meta}</div>
            <div class="detail-text">${article.content}</div>
        `;
        detailContentDiv.innerHTML = fullHtml;
        return true;
    }

    // Global function for inline contact links
    window.showDetail = function(articleId) {
        if (!ARTICLES[articleId]) return;
        savedHomeScroll = window.scrollY;
        if (renderDetailById(articleId)) {
            currentDetailId = articleId;
            homeContainer.classList.add('hidden');
            detailContainer.classList.remove('hidden');
            document.title = `${ARTICLES[articleId].title} - PG Earn`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            history.pushState({ view: 'detail', id: articleId }, '', `#${articleId}`);
            updateFloatingButtonsVisibility();
        }
    };

    function renderCards() {
        cardsArea.innerHTML = '';
        CARD_LIST.forEach((item, idx) => {
            const article = ARTICLES[item.id];
            const shortDesc = (article && article.meta) ? article.meta : item.desc;
            const card = document.createElement('div');
            card.className = 'card';
            card.style.setProperty('--order', idx);
            card.innerHTML = `<h3>${item.title}</h3><p>${shortDesc}</p><div class="badge">📖 Read more →</div>`;
            card.addEventListener('click', () => window.showDetail(item.id));
            cardsArea.appendChild(card);
        });
    }

    function handleScroll() {
        updateFloatingButtonsVisibility();
    }

    function initRouting() {
        if (location.hash && location.hash.length > 1) {
            let id = location.hash.slice(1);
            if (ARTICLES[id]) {
                renderDetailById(id);
                currentDetailId = id;
                homeContainer.classList.add('hidden');
                detailContainer.classList.remove('hidden');
                document.title = `${ARTICLES[id].title} - PG Earn`;
                window.scrollTo({ top: 0 });
                updateFloatingButtonsVisibility();
                return;
            }
        }
        // Default: show home
        currentDetailId = null;
        homeContainer.classList.remove('hidden');
        detailContainer.classList.add('hidden');
        document.title = "PG Earn – Daily Commission | Level Salary Schedule";
        updateFloatingButtonsVisibility();
        // Set initial history state for home
        history.replaceState({ view: 'home' }, '', window.location.pathname);
    }

    // Event listeners
    window.addEventListener('scroll', handleScroll);
    if (backToHomeFloat) backToHomeFloat.addEventListener('click', goToHome);
    if (backToTopBtn) backToTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
    backBtn.addEventListener('click', goToHome);
    themeToggle.addEventListener('click', toggleTheme);
    
    window.addEventListener('popstate', (e) => {
        const state = e.state;
        if (state && state.view === 'detail' && state.id && ARTICLES[state.id]) {
            renderDetailById(state.id);
            currentDetailId = state.id;
            homeContainer.classList.add('hidden');
            detailContainer.classList.remove('hidden');
            document.title = `${ARTICLES[state.id].title} - PG Earn`;
            window.scrollTo({ top: 0 });
            updateFloatingButtonsVisibility();
        } else {
            // fallback: go to home
            if (currentDetailId !== null) {
                currentDetailId = null;
                homeContainer.classList.remove('hidden');
                detailContainer.classList.add('hidden');
                document.title = "PG Earn – Daily Commission | Level Salary Schedule";
                window.scrollTo({ top: savedHomeScroll, behavior: 'instant' });
                updateFloatingButtonsVisibility();
            } else {
                // Already home, ensure correct visibility
                homeContainer.classList.remove('hidden');
                detailContainer.classList.add('hidden');
                updateFloatingButtonsVisibility();
            }
        }
    });

    // Initialize
    initTheme();
    renderCards();
    initRouting();
    handleScroll();
</script>
